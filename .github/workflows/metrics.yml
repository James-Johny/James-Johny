name: Metrics

on:
  # Atualiza automaticamente uma vez por dia
  schedule: 
    - cron: "0 0 * * *"
  # Permite rodar manualmente
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Gerar métricas
        uses: lowlighter/metrics@latest
        with:
          # Token pessoal do GitHub (PAT) que você deve criar e salvar em Settings > Secrets > Actions
          token: ${{ secrets.METRICS_TOKEN }}

          # Usuário alvo
          user: James-Johny

          # Template visual
          template: classic

          # Seções básicas
          base: header, activity, community, repositories, metadata

          # Plugins extras (opcionais)
          plugin_languages: yes
          plugin_followup: yes
          plugin_stargazers: yes
          plugin_calendar: yes

          # Timezone para relatórios
          config_timezone: America/Sao_Paulo